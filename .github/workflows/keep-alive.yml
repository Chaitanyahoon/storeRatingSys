name: Keep Render Alive

on:
  schedule:
    # Ping every 14 minutes to prevent Render free tier from sleeping (sleeps after 15 min)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Check
        run: |
          curl -sf https://storeratingsys.onrender.com/api/health || echo "Backend is waking up..."
